<style>
  /* Banner de instalação PWA */
  #pwa-banner{position:fixed;bottom:0;left:0;right:0;background:var(--verde);color:var(--bege);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.3);transform:translateY(100%);transition:transform .3s ease}
  #pwa-banner.show{transform:translateY(0)}
  #pwa-banner img{width:36px;height:36px;border-radius:8px;flex-shrink:0}
  #pwa-banner-txt{flex:1;font-size:13px;line-height:1.4}
  #pwa-banner-txt strong{display:block;font-size:14px;color:var(--bege)}
  #pwa-banner-txt span{font-size:11px;color:rgba(242,236,206,.7)}
  #pwa-banner-btns{display:flex;gap:8px;flex-shrink:0}
  .pwa-btn-inst{padding:8px 16px;background:var(--dourado);color:var(--verde);border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
  .pwa-btn-skip{padding:8px 12px;background:transparent;color:rgba(242,236,206,.6);border:none;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

<style>
  :root{
    --verde:#1F381F;--verde-med:#2d5a2d;--verde-cl:#4a8a4a;
    --dourado:#E8BC4F;--bege:#F2ECCE;--bege2:#e8e0b8;
    --fundo:#F9F6EC;--txt:#1F381F;--txt2:#5a7a5a;--borda:#d4c89e;
    --r:10px;--rs:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--fundo);color:var(--txt);min-height:100vh}

  /* LOGIN */
  .login-wrap{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--verde);background-image:radial-gradient(circle at 20% 80%,rgba(232,188,79,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(242,236,206,.05) 0%,transparent 50%);padding:20px}
  .login-card{background:#fff;border-radius:16px;padding:32px 36px;width:400px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,.25)}
  .login-logo{text-align:center;margin-bottom:24px;display:flex;flex-direction:column;align-items:center}
  .login-bird{font-size:36px;margin-bottom:8px;opacity:.85;color:var(--verde)}
  .login-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--verde);line-height:1.2}
  .login-sub{font-size:11px;letter-spacing:2px;color:var(--dourado);margin-top:4px;text-transform:uppercase}
  .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .fl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);font-weight:500}
  .fi{border:1px solid var(--borda);border-radius:var(--rs);padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--txt);outline:none;transition:border .15s;width:100%}
  .fi:focus{border-color:var(--verde-cl)}
  .btn-login{width:100%;padding:12px;background:var(--verde);color:var(--bege);border:none;border-radius:var(--rs);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:6px;transition:background .15s}
  .btn-login:hover{background:var(--verde-med)}
  .login-err{background:#fceaea;border:1px solid #f5c1c1;border-radius:var(--rs);padding:9px 12px;font-size:12px;color:#8a1a1a;margin-bottom:12px;display:none}
  .login-loading{opacity:.6;pointer-events:none}

  /* TOAST */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--verde);color:var(--bege);padding:10px 16px;border-radius:8px;font-size:12px;z-index:9999;font-family:'DM Sans',sans-serif;opacity:1;transition:opacity .3s}

  /* APP SHELL */
  #app-shell{display:none}
  .app{display:flex;height:100vh;overflow:hidden}
  .sb{width:210px;background:var(--verde);color:var(--bege);flex-shrink:0;display:flex;flex-direction:column}
  .sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(242,236,206,0.12)}
  .sb-logo-bird{font-size:22px;margin-bottom:6px;opacity:.85}
  .sb-logo-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--bege);line-height:1.2}
  .sb-logo-sub{font-size:9px;letter-spacing:2px;color:var(--dourado);margin-top:3px;text-transform:uppercase}
  .sb-user{padding:12px 18px;border-bottom:1px solid rgba(242,236,206,0.08)}
  .sb-role{display:inline-block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;background:rgba(232,188,79,0.18);color:var(--dourado);border:1px solid rgba(232,188,79,0.25);border-radius:20px;padding:2px 9px;margin-bottom:5px}
  .sb-name{font-size:13px;color:var(--bege);font-weight:500;font-family:'DM Sans',sans-serif}
  .sb-plan-txt{font-size:11px;color:rgba(242,236,206,.5);margin-top:1px}
  .nav{padding:10px 0;flex:1;overflow-y:auto}
  .nav-sec{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(242,236,206,0.3);padding:14px 18px 5px}
  .ni{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:12px;color:rgba(242,236,206,.65);cursor:pointer;border-left:3px solid transparent;transition:all .18s}
  .ni:hover{background:rgba(242,236,206,.05);color:var(--bege)}
  .ni.on{background:rgba(242,236,206,.09);color:var(--bege);border-left-color:var(--dourado)}
  .ni i{font-size:15px;width:15px;flex-shrink:0}
  .sb-bottom{padding:12px 18px;border-top:1px solid rgba(242,236,206,.08)}
  .btn-logout{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(242,236,206,.5);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0}
  .btn-logout:hover{color:var(--bege)}

  .main{flex:1;overflow:auto;background:var(--fundo)}
  .topbar{background:#fff;border-bottom:1px solid var(--borda);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--verde);letter-spacing:.3px}
  .content{padding:20px 24px}

  /* LOADING SPINNER */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(242,236,206,.3);border-top-color:var(--bege);border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .app{flex-direction:column;height:auto;min-height:100vh}
    .sb{width:100%;flex-direction:row;flex-wrap:wrap;height:auto;position:sticky;top:0;z-index:50}
    .sb-logo{padding:10px 14px;border-bottom:none;border-right:1px solid rgba(242,236,206,.12)}
    .sb-logo img{max-width:100px!important}
    .sb-user{padding:10px 14px;border-bottom:none;border-right:1px solid rgba(242,236,206,.08);flex:1}
    .sb-role{font-size:8px;padding:1px 7px}
    .sb-name{font-size:12px}
    .nav{display:none}
    .sb-bottom{padding:8px 14px;border-top:none;margin-left:auto}
    #impersonate-bar{display:none!important}
    .main{overflow:auto;min-height:0;flex:1}
    .topbar{padding:0 14px;height:48px}
    .topbar-t{font-size:16px}
    .content{padding:14px}
    /* Hamburger menu */
    .sb::after{content:'☰';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(242,236,206,.7);font-size:20px;cursor:pointer}

    /* Mobile nav overlay */
    .nav.mobile-open{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--verde);z-index:200;padding-top:60px;overflow-y:auto}
    .nav.mobile-open .nav-sec{padding:14px 20px 5px}
    .nav.mobile-open .ni{padding:12px 20px;font-size:14px}

    /* Grids responsivos */
    .stat-grid, [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
    [style*="grid-template-columns:3fr 2fr"]{grid-template-columns:1fr!important}
    [style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:1fr!important}
    [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}

    /* Login */
    .login-card{padding:24px 20px;width:95vw}
    .login-logo img{width:130px!important}
  }

  /* PÁGINA DE CARREGAMENTO */
  .loading-page{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--verde)}
  .loading-page .spin-big{width:36px;height:36px;border:3px solid rgba(242,236,206,.2);border-top-color:var(--bege);border-radius:50%;animation:spin .8s linear infinite}
  .loading-page p{color:rgba(242,236,206,.6);font-size:13px}
</style>
</head>

<script>
function loginGoogle() {
  if (!window._sb) { alert('Aguarde, carregando...'); return; }
  window._sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href.split('?')[0] }
  }).then(function(r) {
    if (r.error) alert('Erro: ' + r.error.message);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('btn-google');
  if (btn) btn.onclick = loginGoogle;
});
</script>

  let nivel = 1
  for (let i = NIVEL_PONTOS.length - 1; i >= 1; i--) {

function toast(msg, dur=2400) {
  const t = document.createElement('div')
  t.className = 'toast'
  t.textContent = msg
  document.body.appendChild(t)
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300) }, dur)
}

function prazoLabel(min) {

  return '24 horas'
}

window.finalizarOnboarding = async function(userId, email) {
  const nome = document.getElementById('onb-nome').value.trim()
  const tel = document.getElementById('onb-tel').value.trim()
  const planoSel = document.querySelector('input[name="onb-plano"]:checked')
  if (!nome) { toast('Informe seu nome'); return }
  if (!planoSel) { toast('Selecione um plano'); return }

  const planoTipo = planoSel.dataset.plano
  const opcaoAulas = Number(planoSel.dataset.opcao)
  const valorMensal = Number(planoSel.dataset.preco)

  const btn = document.querySelector('#onboarding button[onclick*="finalizarOnboarding"]')
  if (btn) { btn.textContent = 'Salvando...'; btn.disabled = true }

  try {
    // Cria perfil
    const { error: errP } = await sb.from('perfis').upsert({
      id: userId, nome, email, telefone: tel||null, tipo: 'aluno', ativo: true
    })
    if (errP) throw new Error('Erro no perfil: '+errP.message)

    // Cria matrícula
    const { error: errM } = await sb.from('matriculas').insert({
      aluno_id: userId, plano_tipo: planoTipo, opcao_aulas: opcaoAulas, valor_mensal: valorMensal
    })
    if (errM) throw new Error('Erro na matrícula: '+errM.message)

    // Remove onboarding e inicia app
    document.getElementById('onboarding')?.remove()
    _appIniciado = false
    await iniciarApp()
  } catch(e) {
    toast(e.message)
    if (btn) { btn.textContent = 'Começar →'; btn.disabled = false }
  }
}

window.fazerLogin = async function() {
  const email = document.getElementById('login-email').value.trim()
  const senha = document.getElementById('login-senha').value
  const btn = document.getElementById('btn-login')
  const err = document.getElementById('login-err')
  err.style.display = 'none'
  btn.classList.add('login-loading')
  document.getElementById('btn-login-txt').innerHTML = '<span class="spinner"></span>'

  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: senha })
    if (error) throw error
    await iniciarApp()
  } catch(e) {
    err.textContent = e.message === 'Invalid login credentials'
      ? 'E-mail ou senha incorretos.' : e.message
    err.style.display = 'block'
    btn.classList.remove('login-loading')
    document.getElementById('btn-login-txt').textContent = 'Entrar'
  }
}

// ── INICIAR APP ───────────────────────────────────────────────
async function iniciarApp() {
  try {
    console.log('iniciarApp: buscando sessão... sb existe?', !!sb, !!sb?.auth)
    // Pega user direto do token no localStorage — zero rede
    let user = null
    try {
      const tokenKey = Object.keys(localStorage).find(k => k.includes('auth-token'))
      console.log('tokenKey:', tokenKey)
      if (tokenKey) {
        const tokenData = JSON.parse(localStorage.getItem(tokenKey) || '{}')
        user = tokenData?.user || tokenData
        console.log('user do localStorage:', user?.id, user?.email, user?.role)
      }
    } catch(e) { console.error('localStorage err:', e.message) }
    if (!user?.id) {
      console.log('sem user no localStorage, tentando getSession sem await problemático...')
      // Timeout de segurança
      user = await Promise.race([
        sb.auth.getSession().then(r => { console.log('getSession ok:', r.data?.session?.user?.id); return r.data?.session?.user }),
        new Promise(resolve => setTimeout(() => { console.log('getSession TIMEOUT'); resolve(null) }, 3000))
      ])
    }
    console.log('iniciarApp: user =', user?.id, user?.email)
    if (!user) { console.log('iniciarApp: sem user, abortando'); return }

  let perfil = null
  console.log('buscando perfil para id:', user.id)
  try {
    // Busca perfil com timeout de segurança
    const prResult = await Promise.race([
      sb.from('perfis').select('*').eq('id', user.id).single(),
      new Promise(resolve => setTimeout(() => { console.log('PERFIL TIMEOUT'); resolve({data:null,error:{message:'timeout'}}) }, 5000))
    ])
    console.log('perfil result:', JSON.stringify({data: prResult.data?.tipo, error: prResult.error?.message, code: prResult.error?.code}))
    perfil = prResult.data
  } catch(ep) {
    console.error('perfil exception:', ep.message)
  }

  // Se ainda sem perfil, monta um perfil mínimo do localStorage para não travar
  if (!perfil) {
    console.log('perfil não encontrado no banco, usando dados do token')
    perfil = {
      id: user.id,
      nome: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'Usuário',
      email: user.email,
      tipo: 'admin', // temporário — ajuste manual no banco
      ativo: true
    }
    console.log('perfil fallback:', JSON.stringify(perfil))
    // Tenta inserir no banco em background
    sb.from('perfis').upsert(perfil).then(r => console.log('upsert perfil:', r.error?.message || 'ok'))
  }
  console.log('iniciarApp: perfil final =', perfil?.tipo, perfil?.nome)

  // Novo aluno: mostra onboarding obrigatório
  if (!perfil) {
    const nomeGoogle = user.user_metadata?.full_name || user.user_metadata?.name || ''
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('app-shell').style.display = 'none'
    await mostrarOnboarding(user, nomeGoogle)
    return
  }

  window._perfil = perfil
  window._sb = sb

  // UI
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app-shell').style.display = 'block'
  document.getElementById('sb-nome').textContent = perfil.nome
  document.getElementById('sb-role-label').textContent =
    { admin: 'Admin', professor: 'Professor', aluno: 'Aluno' }[perfil.tipo] || perfil.tipo

  // Plano do aluno
  if (perfil.tipo === 'aluno') {
    const { data: mat } = await sb.from('matriculas').select('plano_tipo').eq('aluno_id', perfil.id).eq('ativa', true).single()
    if (mat) {
      const nomes = { brahma: 'Plano Brahma', shiva: 'Plano Shiva', vishnu: 'Plano Vishnu' }
      document.getElementById('sb-plano').textContent = nomes[mat.plano_tipo] || ''
      window._plano = mat.plano_tipo
    }
  }

  console.log('iniciarApp: buildMenu tipo=', perfil.tipo)
  buildMenu(perfil.tipo)
  document.getElementById('app-shell').style.display = 'block'

  // Contrato obrigatório para alunos
  if (perfil.tipo === 'aluno') {
    await verificarContrato(perfil.id, perfil.nome)
    // Creditar saldo do mês atual se não existir
    const mesAtual = new Date().toISOString().slice(0,7) + '-01'
    await sb.rpc('creditar_aulas_mes', { p_aluno_id: perfil.id, p_mes_ref: mesAtual }).catch(()=>{})
  }

  const primeiros = { admin: 'dashboard', professor: 'prof-home', aluno: 'aluno-home' }
  console.log('iniciarApp: navigate para', primeiros[perfil.tipo] || 'dashboard')
  navigate(primeiros[perfil.tipo] || 'dashboard')
  } catch(e) {
    console.error('iniciarApp ERRO:', e.message, e.stack)
    document.getElementById('main-area').innerHTML = '<div style="padding:30px;color:#c0392b;font-family:monospace;font-size:12px">Erro: ' + e.message + '<br><br>' + e.stack + '</div>'
  }
}

async function navigate(page) {
  setActiveNav(page)
  const main = document.getElementById('main-area')
  main.innerHTML = '<div class="loading-page"><div class="spin-big"></div><p>Carregando...</p></div>'
  try {
    await renderPage(page, main)
  } catch(e) {
    main.innerHTML = `<div class="content"><div style="color:#c0392b;font-size:13px;padding:20px">Erro: ${e.message}</div></div>`
    console.error(e)
  }
}
window.navigate = navigate

async function renderPage(page, container) {
  const tipo = window._perfil?.tipo

  // ── DASHBOARD ADMIN ──────────────────────────────────────
  if (page === 'dashboard' && tipo === 'admin') {
    const hoje = new Date()
    const inicioHoje = new Date(hoje); inicioHoje.setHours(0,0,0,0)
    const fimHoje = new Date(hoje); fimHoje.setHours(23,59,59,999)

    const [ocorrencias, alunos, feriados, config] = await Promise.all([
      sb.from('ocorrencias_vagas').select('*').gte('data_hora', inicioHoje.toISOString()).lte('data_hora', fimHoje.toISOString()).eq('cancelada', false).order('data_hora'),
      sb.from('alunos_plano_ativo').select('plano_tipo').then(r => r.data || []),
      (() => { const ate = new Date(); ate.setDate(ate.getDate()+30); return sb.from('feriados').select('*').gte('data', hoje.toISOString().slice(0,10)).lte('data', ate.toISOString().slice(0,10)).order('data') })().then(r => r.data || []),
      sb.from('configuracoes').select('*').then(r => Object.fromEntries((r.data||[]).map(c=>[c.chave,c.valor]))),
    ])

    const aulasHoje = ocorrencias.data || []
    const totalConf = aulasHoje.reduce((s,a)=>s+(a.confirmados||0),0)
    const totalLivres = aulasHoje.reduce((s,a)=>s+(a.vagas_livres||0),0)
    const por = { brahma:0, shiva_1x:0, shiva_2x:0, vishnu_2x:0, vishnu_livre:0 }
    alunos.forEach(a => { if(por[a.plano_tipo]!==undefined) por[a.plano_tipo]++ })

    container.innerHTML = `
      <div class="topbar"><div class="topbar-t">Dashboard</div><div style="font-size:11px;color:var(--txt2)">${hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div></div>
      <div class="content">
        ${feriados.length ? `<div style="background:rgba(232,188,79,.1);border:1px solid rgba(232,188,79,.35);border-radius:6px;padding:9px 13px;display:flex;align-items:center;gap:8px;font-size:12px;color:#7a5a10;margin-bottom:14px"><i class="ti ti-alert-triangle" style="color:var(--dourado)"></i><span><strong>Atenção:</strong> Há feriados nos próximos 30 dias: ${feriados.slice(0,3).map(f=>`${f.nome} (${new Date(f.data+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})})`).join(' · ')}</span></div>` : ''}
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
          <div style="background:#fff;border:1px solid var(--borda);border-radius:var(--r);padding:14px 16px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);margin-bottom:5px">Aulas hoje</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--verde)">${aulasHoje.length}</div></div>
          <div style="background:#fff;border:1px solid var(--borda);border-radius:var(--r);padding:14px 16px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);margin-bottom:5px">Alunos ativos</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--verde)">${alunos.length}</div></div>
          <div style="background:#fff;border:1px solid var(--borda);border-radius:var(--r);padding:14px 16px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);margin-bottom:5px">Confirmações</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--verde)">${totalConf}</div></div>
          <div style="background:#fff;border:1px solid var(--borda);border-radius:var(--r);padding:14px 16px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt2);margin-bottom:5px">Vagas livres</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--verde)">${totalLivres}</div></div>
        </div>

    const dom = new Date(seg); dom.setDate(seg.getDate() + 6); dom.setHours(23,59,59,999)

    const [ocRes, cfgRes, matRes] = await Promise.all([
      sb.from('ocorrencias_vagas').select('*').gte('data_hora', seg.toISOString()).lte('data_hora', dom.toISOString()).order('data_hora'),
      sb.from('configuracoes').select('*'),
      isAluno ? sb.from('matriculas').select('plano_tipo,opcao_aulas').eq('aluno_id', window._perfil.id).eq('ativa',true).single() : Promise.resolve({data:null}),
    ])
    const ocorrencias = ocRes.data || []
    const cfg = Object.fromEntries((cfgRes.data||[]).map(c=>[c.chave,c.valor]))
    const planoAluno = matRes.data?.plano_tipo

    // Modalidades permitidas por plano
    let modPermitidas = ['hatha','acro','raja']
    if (isAluno && planoAluno) {
      const mp = {brahma:['hatha'], shiva:['hatha','raja'], vishnu:['hatha','raja','acro']}
      modPermitidas = mp[planoAluno] || ['hatha']
    }

    // Buscar confirmações do aluno
    let minhasConfs = new Set()
    if (isAluno) {
      const ids = ocorrencias.map(o=>o.id)
      if (ids.length) {
        const { data: confs } = await sb.from('confirmacoes').select('ocorrencia_id').eq('aluno_id', window._perfil.id).in('ocorrencia_id', ids).eq('status','confirmado')
        ;(confs||[]).forEach(c => minhasConfs.add(c.ocorrencia_id))
      }
    }

    // Verificar feriados na semana
    const { data: feriados } = await sb.from('feriados').select('*').gte('data', seg.toISOString().slice(0,10)).lte('data', dom.toISOString().slice(0,10))
    const feriadosDatas = new Set((feriados||[]).map(f=>f.data))

    // Agrupar ocorrências por dia e hora
    const grade = {} // grade[dia_iso][hora] = ocorrencia
    ocorrencias.forEach(o => {
      const dt = new Date(o.data_hora)
      const diaKey = dt.toISOString().slice(0,10)
      const horaKey = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
      if (!grade[diaKey]) grade[diaKey] = {}
      grade[diaKey][horaKey] = o
    })

    // Todas as horas com aulas
    const horasSet = new Set()
    ocorrencias.forEach(o => {
      const dt = new Date(o.data_hora)
      horasSet.add(dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}))
    })
    const horas = [...horasSet].sort()

    // Dias da semana
    const diasDaSemana = []
    for (let i=0; i<7; i++) {
      const d = new Date(seg); d.setDate(seg.getDate()+i)
      diasDaSemana.push(d)
    }

    const prazoMin = Number(cfg.prazo_confirmacao_min||60)

    // Construir grade HTML
    let gradeHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:600px">`
    // Cabeçalho
    gradeHTML += `<tr><th style="background:var(--verde);color:var(--bege);padding:8px;font-size:11px;font-weight:500;width:60px">Hora</th>`
    diasDaSemana.forEach(d => {
      const dStr = d.toISOString().slice(0,10)
      const isHoje = d.toDateString() === hoje.toDateString()
      const isFeriado = feriadosDatas.has(dStr)
      gradeHTML += `<th style="background:${isHoje?'#2d5a2d':'var(--verde)'};color:var(--bege);padding:8px;font-size:10px;font-weight:500;text-align:center;${isFeriado?'opacity:.6':''}">
        ${d.toLocaleDateString('pt-BR',{weekday:'short'})}<br>
        <span style="font-size:11px;font-weight:400">${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</span>
        ${isFeriado?'<br><span style="font-size:9px;color:var(--dourado)">feriado</span>':''}
      </th>`
    })
    gradeHTML += '</tr>'

    // Linhas de hora
    if (horas.length === 0) {
      gradeHTML += `<tr><td colspan="8" style="text-align:center;padding:30px;font-size:13px;color:var(--txt2)">Nenhuma aula agendada esta semana.</td></tr>`
    }
    horas.forEach(hora => {
      gradeHTML += `<tr><td style="background:rgba(242,236,206,.5);padding:6px 8px;font-size:11px;font-weight:500;color:var(--txt2);text-align:center;border:1px solid var(--borda)">${hora}</td>`
      diasDaSemana.forEach(d => {
        const dStr = d.toISOString().slice(0,10)
        const oc = grade[dStr]?.[hora]
        const isFeriado = feriadosDatas.has(dStr)
        if (!oc) {
          gradeHTML += `<td style="border:1px solid rgba(212,200,158,.3);background:#fafaf7;min-height:48px"></td>`
        } else {
          const confirmado = minhasConfs.has(oc.id)
          const lotada = oc.vagas_livres <= 0
          const agora = new Date()
          const dtAula = new Date(oc.data_hora)
          const prazoLimite = new Date(dtAula.getTime() - prazoMin*60000)
          const foraPrazo = agora > prazoLimite
          const permitida = modPermitidas.includes(oc.modalidade)
          const passada = dtAula < agora

          let bgCell = '#fff'
          let borderCell = `border-left:3px solid ${CORES[oc.modalidade]||'#888'}`
          if (confirmado) bgCell = 'rgba(232,188,79,.08)'
          if (!permitida) bgCell = '#f8f8f8'

          let actionHtml = ''
          if (isAluno && !passada) {
            if (!permitida) {
              actionHtml = `<div style="font-size:9px;color:#ccc;margin-top:3px">🔒 ${planoAluno}</div>`
            } else if (confirmado) {
              actionHtml = `<div style="font-size:9px;color:var(--dourado);font-weight:500;margin-top:3px">✓ Confirmado</div>`
            } else if (foraPrazo) {
              actionHtml = `<div style="font-size:9px;color:#c0392b;margin-top:3px">Prazo enc.</div>`
            } else if (lotada) {
              actionHtml = `<div style="font-size:9px;color:#c0392b;margin-top:3px">Lotada</div>`
            } else {
              actionHtml = `<button onclick="confirmarOcorrencia('${oc.id}')" style="margin-top:3px;padding:2px 7px;background:var(--dourado);color:var(--verde);border:none;border-radius:4px;font-size:9px;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif">Confirmar</button>`
            }
          }

          const adminActions = !isAluno ? `<div style="display:flex;gap:2px;margin-top:3px">
            <button onclick="event.stopPropagation();editarOcorrencia('${oc.id}')" style="padding:1px 5px;background:rgba(31,56,31,.1);color:var(--verde);border:none;border-radius:3px;font-size:9px;cursor:pointer" title="Editar">✎</button>
            <button onclick="event.stopPropagation();excluirOcorrencia('${oc.id}')" style="padding:1px 5px;background:rgba(255,0,0,.08);color:#c0392b;border:none;border-radius:3px;font-size:9px;cursor:pointer" title="Excluir">✕</button>
            <button onclick="event.stopPropagation();verPresencasOcorrencia('${oc.id}')" style="padding:1px 5px;background:rgba(31,56,31,.1);color:var(--verde);border:none;border-radius:3px;font-size:9px;cursor:pointer" title="Presenças">👥</button>
          </div>` : ''
          gradeHTML += `<td style="border:1px solid rgba(212,200,158,.3);background:${bgCell};padding:5px 7px;vertical-align:top;cursor:${isAluno?'default':'pointer'}" ${!isAluno?`onclick="verDetalhesOcorrencia('${oc.id}')"`:''}">
            <div style="font-size:10px;font-weight:500;${borderCell};padding-left:4px;line-height:1.3;color:${!permitida?'#ccc':'var(--txt)'}">${NOMES[oc.modalidade]}</div>
            <div style="font-size:9px;color:var(--txt2);margin-top:2px">${oc.confirmados||0}/${oc.vagas_total}</div>
            ${isFeriado&&!isAluno?`<div style="font-size:9px;color:#8a6b1a;margin-top:1px">⚠ feriado</div>`:''}
            ${actionHtml}
            ${adminActions}
          </td>`
        }
      })
      gradeHTML += '</tr>'
    })
    gradeHTML += '</table></div>'

    // Legenda
    const legendaHtml = `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px">
      ${['hatha','acro','raja'].map(m=>`<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)">${dot(m)}${NOMES[m]}</span>`).join('')}
      ${isAluno?`<span style="font-size:11px;color:var(--txt2)">· Prazo: <strong>${prazoMin>=60?prazoMin/60+'h':prazoMin+'min'}</strong> antes</span>`:''}
    </div>`

    // Navegação de semana
    const navHtml = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <button onclick="window._gradeOffset=(window._gradeOffset||0)-1;navigate('${page}')" style="padding:5px 10px;background:#fff;color:var(--txt);border:1px solid var(--borda);border-radius:5px;font-size:13px;cursor:pointer">‹</button>
      <button onclick="window._gradeOffset=0;navigate('${page}')" style="padding:5px 12px;background:${(window._gradeOffset||0)===0?'var(--verde)':'#fff'};color:${(window._gradeOffset||0)===0?'var(--bege)':'var(--txt)'};border:1px solid ${(window._gradeOffset||0)===0?'var(--verde)':'var(--borda)'};border-radius:5px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">Hoje</button>
      <button onclick="window._gradeOffset=(window._gradeOffset||0)+1;navigate('${page}')" style="padding:5px 10px;background:#fff;color:var(--txt);border:1px solid var(--borda);border-radius:5px;font-size:13px;cursor:pointer">›</button>
      <span style="font-size:12px;color:var(--txt2);font-weight:500">${seg.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})} – ${dom.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>
      ${!isAluno?`<div style="margin-left:auto;display:flex;gap:6px">
        <button onclick="navigate('criar-aulas')" style="padding:5px 12px;background:var(--verde);color:var(--bege);border:none;border-radius:5px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">+ Nova Aula</button>
      </div>`:''}
    </div>`

    // Modal detalhes ocorrência (admin)
    const modalDetalhes = !isAluno ? modal('modal-det-oc', 'Detalhes da Aula',
      `<div id="det-oc-body">Carregando...</div>`,
      `<button onclick="document.getElementById('modal-det-oc').style.display='none'" style="padding:7px 14px;background:transparent;border:1px solid var(--borda);border-radius:6px;font-size:12px;cursor:pointer">Fechar</button>
       <button onclick="navigate('presencas')" style="padding:7px 14px;background:var(--verde);color:var(--bege);border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Ver Presenças</button>`
    ) : ''

    container.innerHTML = `
      <div class="topbar">
        <div class="topbar-t">Grade de Aulas</div>
        ${isAluno?`<div>${badge('Plano '+planoAluno,'#e8f4e8','#1a5a1a')}</div>`:''}
      </div>
      <div class="content">
        ${feriados?.length?`<div style="background:rgba(232,188,79,.1);border:1px solid rgba(232,188,79,.35);border-radius:6px;padding:9px 13px;display:flex;align-items:center;gap:8px;font-size:12px;color:#7a5a10;margin-bottom:12px"><i class="ti ti-alert-triangle" style="color:var(--dourado)"></i><span>Há feriados esta semana: ${(feriados||[]).map(f=>f.nome).join(', ')}</span></div>`:''}
        ${navHtml}
        ${legendaHtml}
        ${gradeHTML}
      </div>
      ${modalDetalhes}
    `

    window.editarOcorrencia = async function(ocId) {
      const { data: oc } = await sb.from('ocorrencias').select('*, aula:aulas(vagas,modalidade)').eq('id', ocId).single()
      const dt = new Date(oc.data_hora)
      const novaData = prompt('Data da aula (AAAA-MM-DD):', dt.toISOString().slice(0,10))
      if (!novaData) return
      const novaHora = prompt('Hora (HH:MM):', dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}))
      if (!novaHora) return
      const novasVagas = prompt('Vagas:', oc.vagas_override||oc.aula?.vagas||15)
      const dtNova = novaData + 'T' + novaHora + ':00-03:00'
      const { data: fer } = await sb.from('feriados').select('nome').eq('data', novaData)
      await sb.from('ocorrencias').update({
        data_hora: dtNova,
        vagas_override: novasVagas ? Number(novasVagas) : null,
        eh_feriado: !!(fer&&fer.length),
        nome_feriado: fer?.[0]?.nome||null
      }).eq('id', ocId)
      toast('✓ Aula atualizada')
      navigate(page)
    }

    window.excluirOcorrencia = async function(ocId) {
      if (!confirm('Excluir esta aula? As confirmações também serão removidas.')) return
      await sb.from('confirmacoes').delete().eq('ocorrencia_id', ocId)
      await sb.from('ocorrencias').delete().eq('id', ocId)
      toast('Aula excluída')
      navigate(page)
    }

    window.verPresencasOcorrencia = async function(ocId) {
      window._ocPresencaId = ocId
      navigate('presencas')
    }

    window.confirmarOcorrencia = async function(ocId) {
      const { data, error } = await sb.rpc('confirmar_presenca', { p_aluno_id: window._perfil.id, p_ocorrencia_id: ocId })
      if (error || !data?.ok) { toast('❌ '+(data?.motivo||error?.message)); return }
      toast('✓ Presença confirmada!')
      navigate(page)
    }

    window.verDetalhesOcorrencia = async function(ocId) {
      const modal = document.getElementById('modal-det-oc')
      modal.style.display = 'flex'
      const body = document.getElementById('det-oc-body')
      body.innerHTML = 'Carregando...'
      const [ocRes, confsRes] = await Promise.all([
        sb.from('ocorrencias_vagas').select('*').eq('id', ocId).single(),
        sb.from('confirmacoes').select('*, aluno:perfis!aluno_id(nome)').eq('ocorrencia_id', ocId).in('status',['confirmado','presente','ausente']).order('confirmado_em'),
      ])
      const oc = ocRes.data
      const confs = confsRes.data || []
      const dt = new Date(oc.data_hora)
      body.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="background:var(--fundo);border-radius:6px;padding:12px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2)">Aula</div><div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--verde)">${NOMES[oc.modalidade]}</div></div>
          <div style="background:var(--fundo);border-radius:6px;padding:12px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2)">Data/Hora</div><div style="font-size:13px;font-weight:500;color:var(--verde);margin-top:3px">${dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'})} ${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="background:var(--fundo);border-radius:6px;padding:12px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2)">Confirmados</div><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--verde)">${oc.confirmados||0}/${oc.vagas_total}</div></div>
          <div style="background:var(--fundo);border-radius:6px;padding:12px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2)">Professor</div><div style="font-size:13px;font-weight:500;color:var(--verde);margin-top:3px">${oc.professor_nome||'—'}</div></div>
        </div>
        ${oc.eh_feriado?`<div style="background:rgba(232,188,79,.1);border:1px solid rgba(232,188,79,.35);border-radius:6px;padding:8px 12px;font-size:12px;color:#7a5a10;margin-bottom:12px">⚠ Esta aula cai em feriado: ${oc.nome_feriado}</div>`:''}
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);margin-bottom:8px">Alunos confirmados (${confs.length})</div>
        ${confs.length===0?'<div style="font-size:12px;color:var(--txt2);padding:10px 0">Nenhuma confirmação ainda.</div>':
          confs.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--fundo);border-radius:6px;margin-bottom:4px">
            <span style="font-size:12px;font-weight:500">${c.aluno?.nome||'—'}</span>
            ${badge(c.status==='confirmado'?'Confirmado':c.status==='presente'?'Presente':'Ausente',
              c.status==='confirmado'?'#e8f4e8':c.status==='presente'?'#e8f4e8':'#fceaea',
              c.status==='ausente'?'#8a1a1a':'#1a5a1a')}
          </div>`).join('')
        }
      `
      window._ocAtual = ocId
    }
    return
  }

  // ── CRIAR AULAS ──────────────────────────────────────────
  if (page === 'criar-aulas') {
    const [aulasRes, profsRes, cfgRes] = await Promise.all([
      sb.from('aulas').select('*, professor:perfis!professor_id(nome), horarios:aulas_horarios(*)').order('criado_em', {ascending:false}),
      sb.from('perfis').select('id,nome').in('tipo',['admin','professor']).order('nome'),
      sb.from('configuracoes').select('*'),
    ])
    const aulas = aulasRes.data || []
    const profs = profsRes.data || []
    const cfg = Object.fromEntries((cfgRes.data||[]).map(c=>[c.chave,c.valor]))
    const fixas = aulas.filter(a=>a.tipo==='fixa')
    const avulsas = aulas.filter(a=>a.tipo==='avulsa')

    function renderAulaRow(a) {
      const diasStr = (a.horarios||[]).map(h=>`${DIAS_LABEL[h.dia_semana]||h.dia_semana} ${h.hora_inicio.slice(0,5)}`).join(', ')
      const statusBadge = a.ativa
        ? badge('Ativa','#e8f4e8','#1a5a1a')
        : badge('Inativa','#fceaea','#8a1a1a')
      return `<div style="display:grid;grid-template-columns:1fr 110px 90px 60px 80px 70px;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(212,200,158,.3);font-size:12px">
        <span style="display:flex;align-items:center;gap:6px">${dot(a.modalidade)}<strong>${NOMES[a.modalidade]}</strong><span style="font-size:10px;color:var(--txt2)">${diasStr}</span></span>
        <span style="font-size:11px;color:var(--txt2)">${a.professor?.nome||'—'}</span>
        <span style="font-size:11px">${a.vagas} vagas</span>
        <span>${statusBadge}</span>
        <button onclick="gerarOcorrenciasAula('${a.id}')" style="padding:3px 8px;background:rgba(31,56,31,.08);color:var(--verde);border:1px solid rgba(31,56,31,.2);border-radius:4px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif">Gerar</button>
        <div style="display:flex;gap:3px">
          <button onclick="editarAula('${a.id}')" style="padding:3px 7px;background:#e8f4e8;color:#1a5a1a;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif" title="Editar">✎</button>
          <button onclick="excluirAula('${a.id}')" style="padding:3px 7px;background:#fceaea;color:#8a1a1a;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif" title="Excluir">✕</button>
        </div>
      </div>`
    }

    const diasCheckboxes = ['seg','ter','qua','qui','sex','sab','dom'].map(d=>
      `<label style="display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--borda);border-radius:20px;font-size:11px;cursor:pointer">
        <input type="checkbox" name="dia" value="${d}" style="accent-color:var(--verde)"> ${DIAS_LABEL[d].slice(0,3)}
      </label>`
    ).join('')

    const profsOptions = profs.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')

    const modalCriar = modal('modal-criar-aula', 'Nova Aula',
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${fi('','Modalidade',`<select id="na-mod" ${inputStyle}><option value="hatha">Hatha Yoga</option><option value="acro">Acro Yoga</option><option value="raja">Raja Yoga</option></select>`)}
        ${fi('','Tipo',`<select id="na-tipo" ${inputStyle} onchange="toggleTipoAula()"><option value="fixa">Fixa (recorrente)</option><option value="avulsa">Avulsa (única)</option></select>`)}
      </div>
      <div id="na-dias-wrap">
        ${fi('','Dias da semana',`<div style="display:flex;flex-wrap:wrap;gap:6px">${diasCheckboxes}</div>`)}
      </div>
      <div id="na-data-wrap" style="display:none">
        ${fi('','Data',`<input type="date" id="na-data" ${inputStyle}>`)}
      </div>
      <div id="na-horas-wrap">
        <div style="margin-bottom:12px">
          <label style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);font-weight:500;display:block;margin-bottom:6px">Horários (selecione um ou mais)</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px" id="na-horas-checks">
            ${HORARIOS.map(h=>`<label style="display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--borda);border-radius:20px;font-size:11px;cursor:pointer"><input type="checkbox" name="hora" value="${h}" style="accent-color:var(--verde)"> ${h}</label>`).join('')}
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${fi('','Duração',`<select id="na-dur" ${inputStyle}><option value="60">60 minutos</option><option value="75">75 minutos</option><option value="90">90 minutos</option></select>`)}
        ${fi('','Vagas',`<input type="number" id="na-vagas" value="${cfg.vagas_padrao||15}" min="1" max="100" ${inputStyle}>`)}
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:12px">
        ${fi('','Professor',`<select id="na-prof" ${inputStyle}>${profsOptions}</select>`)}
      </div>
      <div id="na-feriado-warn" style="display:none;background:rgba(232,188,79,.1);border:1px solid rgba(232,188,79,.35);border-radius:6px;padding:8px 12px;font-size:12px;color:#7a5a10">⚠ Data coincide com feriado. Verifique antes de confirmar.</div>`,

    window.salvarNovaAula = async function() {
      const mod = document.getElementById('na-mod').value
      const tipo = document.getElementById('na-tipo').value
      const dur = document.getElementById('na-dur').value
      const vagas = document.getElementById('na-vagas').value
      const prof = document.getElementById('na-prof').value

      if (tipo === 'fixa') {
        const dias = [...document.querySelectorAll('input[name="dia"]:checked')].map(el=>el.value)
        const horas = [...document.querySelectorAll('input[name="hora"]:checked')].map(el=>el.value)
        if (!dias.length) { toast('Selecione ao menos um dia da semana'); return }
        if (!horas.length) { toast('Selecione ao menos um horário'); return }

        // Cria uma aula para cada combinação dia+hora
        for (const hora of horas) {
          const { data: novaAula, error: errAula } = await sb.from('aulas').insert({
            modalidade: mod, tipo, vagas: Number(vagas), duracao_min: Number(dur),
            professor_id: prof||null, criado_por: window._perfil.id
          }).select().single()
          if (errAula) { toast('Erro: '+errAula.message); return }
          const horarios = dias.map(d => ({ aula_id: novaAula.id, dia_semana: d, hora_inicio: hora+':00' }))
          const { error: errH } = await sb.from('aulas_horarios').insert(horarios)
          if (errH) { toast('Erro horários: '+errH.message); return }
        }
        document.getElementById('modal-criar-aula').style.display = 'none'
        toast('✓ Aulas criadas! Clique em "Gerar" para criar as datas.')
        navigate('criar-aulas')
      } else {
        const hora = [...document.querySelectorAll('input[name="hora"]:checked')].map(el=>el.value)[0]
        const data = document.getElementById('na-data').value
        if (!data) { toast('Informe a data'); return }
        if (!hora) { toast('Selecione um horário'); return }
        const { data: novaAula, error: errAula } = await sb.from('aulas').insert({
          modalidade: mod, tipo, vagas: Number(vagas), duracao_min: Number(dur),

        await sb.from('ocorrencias').insert({
          aula_id: novaAula.id, data_hora: dtOc.toISOString(),
          eh_feriado: !!(fer&&fer.length), nome_feriado: fer?.[0]?.nome||null
        })

        toast('✓ Aula avulsa criada!')
        navigate('criar-aulas')

    window.executarGerarOcorrencias = async function() {
      const de = document.getElementById('ger-de').value
      const ate = document.getElementById('ger-ate').value
      if (!de||!ate) { toast('Preencha as datas'); return }

      const btnGerar = document.querySelector('#modal-gerar button[onclick="executarGerarOcorrencias()"]')
      if (btnGerar) { btnGerar.textContent = 'Gerando...'; btnGerar.disabled = true }

      try {
        const { data: aula, error: errAula } = await sb.from('aulas').select('*, horarios:aulas_horarios(*)').eq('id', window._aulaParaGerar).single()
        if (errAula || !aula) { toast('Erro ao buscar aula: '+(errAula?.message||'não encontrada')); return }
        if (!aula.horarios?.length) { toast('Esta aula não tem horários cadastrados'); return }

        const { data: feriados } = await sb.from('feriados').select('*').gte('data',de).lte('data',ate)
        const feriadosDatas = new Set((feriados||[]).map(f=>f.data))
        const diasMap = {seg:1,ter:2,qua:3,qui:4,sex:5,sab:6,dom:0}

        const ocorrencias = []
        const cursor = new Date(de+'T12:00:00')
        const fimDate = new Date(ate+'T12:00:00')
        let iteracoes = 0

        while (cursor <= fimDate && iteracoes < 400) {
          iteracoes++
          const diaSemana = cursor.getDay()
          for (const h of (aula.horarios||[])) {
            if (diasMap[h.dia_semana] === diaSemana) {
              const partes = h.hora_inicio.split(':')
              const hora = Number(partes[0])
              const min = Number(partes[1]||0)
              // Usa horário local BR (UTC-3)
              const dStr = cursor.toISOString().slice(0,10)
              const dtISO = dStr + 'T' + String(hora).padStart(2,'0') + ':' + String(min).padStart(2,'0') + ':00-03:00'
              const feriadoNome = feriadosDatas.has(dStr) ? (feriados||[]).find(f=>f.data===dStr)?.nome : null
              ocorrencias.push({ aula_id: aula.id, data_hora: dtISO, eh_feriado:!!feriadoNome, nome_feriado:feriadoNome||null })
            }
          }
          cursor.setDate(cursor.getDate()+1)
        }

        if (!ocorrencias.length) {
          toast('Nenhuma data gerada. Verifique os dias da semana configurados na aula.')
          return
        }

        // Insere em lotes de 50
        let inseridos = 0
        for (let i=0; i<ocorrencias.length; i+=50) {
          const lote = ocorrencias.slice(i, i+50)
          const { error } = await sb.from('ocorrencias').upsert(lote, {onConflict:'aula_id,data_hora', ignoreDuplicates:true})
          if (error) { toast('Erro ao inserir: '+error.message); return }
          inseridos += lote.length
        }

        document.getElementById('modal-gerar').style.display = 'none'
        toast('✓ '+inseridos+' aulas geradas com sucesso!')
        navigate('criar-aulas')
      } finally {
        if (btnGerar) { btnGerar.textContent = 'Gerar'; btnGerar.disabled = false }
      }
    }

      const email = document.getElementById('ca-email').value.trim()
      const tel = document.getElementById('ca-tel').value.trim()
      const plano = document.getElementById('ca-plano').value
      const opcao = PLANO_OPCOES[plano]||1
      const valor = Number(document.getElementById('ca-valor').value)||PLANO_VALORES[plano]||0
      if (!nome||!email) { toast('Preencha nome e e-mail'); return }

async function verificarContrato(userId, nomeAluno) {
  const { data } = await sb.from('contratos').select('id').eq('aluno_id', userId).eq('versao', CONTRATO_VERSAO).single()
  if (data) return true // já aceitou

  return new Promise(resolve => {
    const div = document.createElement('div')
    div.style.cssText = 'position:fixed;inset:0;background:rgba(31,56,31,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px'
    div.innerHTML = `
      <div style="background:#fff;border-radius:12px;width:580px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden">
        <div style="background:var(--verde);padding:18px 22px;flex-shrink:0">

          <div style="font-size:11px;color:rgba(242,236,206,.7);margin-top:2px">Leia com atenção antes de continuar</div>
        </div>
        <div style="overflow-y:auto;flex:1;padding:20px 22px">
          ${CONTRATO_TEXTO.replace('[NOME]', nomeAluno)}
        </div>
        <div style="padding:16px 22px;border-top:1px solid var(--borda);background:#fafaf7;flex-shrink:0">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:14px">
            <input type="checkbox" id="check-contrato" style="margin-top:2px;width:16px;height:16px;accent-color:var(--verde);flex-shrink:0">
            <span style="font-size:13px;color:var(--txt)">Li, entendi e concordo com todos os termos acima, incluindo as regras de saldo de aulas e a política de cancelamento.</span>
          </label>
          <button id="btn-aceitar-contrato" disabled onclick="aceitarContrato('${userId}')" style="width:100%;padding:12px;background:#ccc;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:not-allowed;font-weight:500;transition:all .2s">
            Concordar e Continuar
          </button>
        </div>
      </div>
    `
    document.body.appendChild(div)
    window._resolveContrato = resolve
    window._divContrato = div

    document.getElementById('check-contrato').addEventListener('change', function() {
      const btn = document.getElementById('btn-aceitar-contrato')
      btn.disabled = !this.checked
      btn.style.background = this.checked ? 'var(--verde)' : '#ccc'
      btn.style.cursor = this.checked ? 'pointer' : 'not-allowed'
    })
  })
}

window.aceitarContrato = async function(userId) {
  const btn = document.getElementById('btn-aceitar-contrato')
  btn.textContent = 'Salvando...'
  btn.disabled = true

  const { error } = await sb.from('contratos').insert({
    aluno_id: userId,
    versao: CONTRATO_VERSAO,
    user_agent: navigator.userAgent
  })

  if (error && !error.message.includes('unique')) {
    toast('Erro ao salvar contrato: ' + error.message)
    btn.textContent = 'Concordar e Continuar'
    btn.disabled = false
    return
  }

  window._divContrato?.remove()
  window._resolveContrato?.(true)
}

// ── SALDO E GAMIFICAÇÃO ─────────────────────────────────────
async function getSaldoAluno(alunoId) {
  const { data } = await sb.from('saldo_disponivel').select('*').eq('aluno_id', alunoId).single()
  return data
}

async function getGamificacao(alunoId) {
  let { data } = await sb.from('gamificacao').select('*').eq('aluno_id', alunoId).single()
  if (!data) {
    const { data: novo } = await sb.from('gamificacao').insert({ aluno_id: alunoId }).select().single()
    data = novo
  }
  return data
}

async function getConquistas(alunoId) {
  const { data: todas } = await sb.from('conquistas').select('*').order('pontos')
  const { data: minhas } = await sb.from('aluno_conquistas').select('conquista_cod, desbloqueado_em').eq('aluno_id', alunoId)
  const set = new Set((minhas||[]).map(c => c.conquista_cod))
  return (todas||[]).map(c => ({ ...c, desbloqueada: set.has(c.codigo), quando: minhas?.find(m=>m.conquista_cod===c.codigo)?.desbloqueado_em }))
}

async function verificarConquistas(alunoId) {
  // Busca stats do aluno
  const { data: saldo } = await sb.from('saldo_disponivel').select('total_usadas').eq('aluno_id', alunoId).single()
  const totalAulas = saldo?.total_usadas || 0
  const { data: gam } = await sb.from('gamificacao').select('*').eq('aluno_id', alunoId).single()

  const conquistas = []
  if (totalAulas >= 1)  conquistas.push('primeira_aula')
  if (totalAulas >= 5)  conquistas.push('aulas_5')
  if (totalAulas >= 10) conquistas.push('aulas_10')
  if (totalAulas >= 25) conquistas.push('aulas_25')
  if (totalAulas >= 50) conquistas.push('aulas_50')
  if (gam?.streak_atual >= 4)  conquistas.push('streak_4')
  if (gam?.streak_atual >= 12) conquistas.push('streak_12')
  if (gam?.streak_atual >= 24) conquistas.push('streak_24')

  for (const cod of conquistas) {
    const { error } = await sb.from('aluno_conquistas')
      .insert({ aluno_id: alunoId, conquista_cod: cod })
      .select()
    if (!error) {
      // Nova conquista desbloqueada!
      const { data: c } = await sb.from('conquistas').select('*').eq('codigo', cod).single()
      if (c) mostrarToastConquista(c)
    }
  }
}

function mostrarToastConquista(conquista) {
  const t = document.createElement('div')
  t.style.cssText = 'position:fixed;top:20px;right:20px;background:#fff;border:2px solid var(--dourado);border-radius:12px;padding:14px 18px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.15);max-width:280px;animation:slideIn .3s ease'
  t.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:28px">${conquista.icone}</div>
      <div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dourado);font-weight:500">Conquista desbloqueada!</div>
        <div style="font-weight:500;font-size:13px;color:var(--verde);margin-top:2px">${conquista.nome}</div>
        <div style="font-size:11px;color:var(--txt2)">${conquista.descricao} · +${conquista.pontos} pts</div>
      </div>
    </div>
  `
  document.body.appendChild(t)
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300) }, 4000)
}

// ── VERIFICAR SESSÃO AO CARREGAR ──────────────────────────────
let _appIniciado = false

async function tentarIniciar(origem) {
  console.log('tentarIniciar chamado de:', origem, '| _appIniciado:', _appIniciado)
  if (_appIniciado) { console.log('já iniciado, ignorando'); return }
  _appIniciado = true
  document.getElementById('login-screen').style.display = 'none'
  await iniciarApp()
}

sb.auth.onAuthStateChange(async (event, session) => {
  console.log('auth event:', event, '| session:', !!session, '| _appIniciado:', _appIniciado)
  if (event === 'SIGNED_OUT') {
    _appIniciado = false
    document.getElementById('app-shell').style.display = 'none'
    document.getElementById('login-screen').style.display = 'block'
    return
  }
  if (session && ['SIGNED_IN','TOKEN_REFRESHED','INITIAL_SESSION'].includes(event)) {
    await tentarIniciar('onAuthStateChange:' + event)
  }
})

// Verifica sessão existente ao carregar
console.log('verificando sessão inicial...')
try {
  const { data: { session: sessaoInicial }, error: errSessao } = await sb.auth.getSession()
  console.log('sessão inicial:', !!sessaoInicial, errSessao?.message)
  if (sessaoInicial) {
    await tentarIniciar('getSession')
  } else {
    document.getElementById('login-screen').style.display = 'block'
  }
} catch(e) {
  console.error('erro ao verificar sessão:', e.message)
  document.getElementById('login-screen').style.display = 'block'
}

<script>
// ── Service Worker + PWA ────────────────────────────────────
window.window._deferredPrompt = null

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.log('SW erro:', err))
  })
}

// Captura o evento de instalação
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault()
  window._deferredPrompt = e
  // Mostra banner só se não foi dispensado antes
  if (!localStorage.getItem('pwa-dispensado')) {
    setTimeout(() => {
      document.getElementById('pwa-banner')?.classList.add('show')
    }, 3000)
  }
})

window.instalarPWA = async function() {
  if (!window._deferredPrompt) return
  document.getElementById('pwa-banner')?.classList.remove('show')
  window._deferredPrompt.prompt()
  const { outcome } = await window._deferredPrompt.userChoice
  console.log('PWA install:', outcome)
  window._deferredPrompt = null
}

window.dispensarPWA = function() {
  document.getElementById('pwa-banner')?.classList.remove('show')
  localStorage.setItem('pwa-dispensado', '1')
}

// Se já instalado, esconde banner
window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner')?.classList.remove('show')
  window._deferredPrompt = null
  console.log('PWA instalado!')
})
</script>
